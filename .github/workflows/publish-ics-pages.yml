name: Publish ICS to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      first_semester_start:
        description: "First semester start (YYYY-MM-DD)"
        required: true
        default: "2026-04-13"
      first_semester_end:
        description: "First semester end (YYYY-MM-DD)"
        required: true
        default: "2026-08-07"
      second_semester_start:
        description: "Second semester start (YYYY-MM-DD)"
        required: true
        default: "2026-10-01"
      second_semester_end:
        description: "Second semester end (YYYY-MM-DD)"
        required: true
        default: "2027-02-05"
  push:
    branches: ["main", "master"]
    paths:
      - "convert_table_to_ics.py"
      - "requirements.txt"
      - "output/tables/table_03.csv"
      - ".github/workflows/publish-ics-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build ICS and JSON
        run: |
          python convert_table_to_ics.py \
            --input-csv output/tables/table_03.csv \
            --output-json public/calendar_events.json \
            --output-ics public/kyushu_timetable.ics \
            --first-semester-start "${{ github.event.inputs.first_semester_start || '2026-04-13' }}" \
            --first-semester-end "${{ github.event.inputs.first_semester_end || '2026-08-07' }}" \
            --second-semester-start "${{ github.event.inputs.second_semester_start || '2026-10-01' }}" \
            --second-semester-end "${{ github.event.inputs.second_semester_end || '2027-02-05' }}"

      - name: Create index page
        run: |
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Kyushu Timetable ICS</title>
          </head>
          <body>
            <h1>Kyushu Timetable</h1>
            <p><a href="./kyushu_timetable.ics">Download ICS</a></p>
            <p><a href="./calendar_events.json">View JSON</a></p>
            <p>For iPhone subscription, use this URL with webcal:// manually:
               <code>https://&lt;username&gt;.github.io/&lt;repo&gt;/kyushu_timetable.ics</code></p>
          </body>
          </html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
